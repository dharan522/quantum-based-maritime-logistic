name: QAOA Maritime Logistics CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scipy networkx matplotlib pytest

      - name: Generate dataset
        run: python data/generate_data.py

      - name: Run lightweight tests only
        run: |
          pytest tests/test_all.py::TestDigitalTwin -v --tb=short